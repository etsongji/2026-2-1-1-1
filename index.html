<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sentence Scanner — 문장 구조 분석기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f6fb;
    --surface: #ffffff;
    --surface2: #edf0f7;
    --border: #d4daea;
    --text: #1a2035;
    --text-dim: #6b7593;
    --accent: #2563eb;
    --verb-bg: rgba(220, 38, 38, 0.08);
    --verb-color: #dc2626;
    --verb-border: #dc2626;
    --correct: #16a34a;
    --wrong: #dc2626;
    --gold: #d97706;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* === HEADER === */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(244,246,251,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
  }

  .logo {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.5px;
  }
  .logo span { color: var(--text-dim); font-weight: 400; }

  /* === LAYOUT === */
  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 32px 24px 80px;
  }

  .hero {
    text-align: center;
    margin-bottom: 36px;
  }
  .hero h1 {
    font-family: 'Libre Baskerville', serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 8px;
  }
  .hero h1 em { font-style: italic; color: var(--accent); }
  .hero p {
    color: var(--text-dim);
    font-size: 13px;
    line-height: 1.6;
  }

  /* === PART SECTION === */
  .part-section { margin-bottom: 32px; }
  .part-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .part-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 4px;
    background: var(--surface2);
    color: var(--accent);
    border: 1px solid var(--border);
  }
  .part-title { font-size: 13px; color: var(--text-dim); font-weight: 500; }

  /* === SENTENCE CARD === */
  .sentence-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
    margin-bottom: 14px;
    position: relative;
  }
  .sentence-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .verb-count-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 10px;
    background: var(--verb-bg);
    color: var(--verb-color);
    border: 1px solid var(--verb-border);
  }
  .sentence-text {
    font-family: 'Libre Baskerville', serif;
    font-size: 15px;
    line-height: 1.8;
    color: var(--text);
    user-select: none;
    cursor: crosshair;
  }
  .word-token {
    display: inline;
    border-radius: 3px;
    padding: 1px 0;
    white-space: pre-wrap;
  }
  .word-token.is-verb {
    background: var(--verb-bg);
    color: var(--verb-color);
    border-bottom: 2px solid var(--verb-border);
    font-weight: 700;
  }

  /* === QUIZ BLOCK === */
  .quiz-block {
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px dashed var(--border);
  }
  .quiz-underline { display: flex; align-items: baseline; gap: 8px; margin-bottom: 9px; }
  .quiz-underline-label { font-size: 9px; color: #fff; background: #374151; padding: 2px 6px; border-radius: 3px; }
  .quiz-underline-text { font-family: 'Libre Baskerville', serif; font-size: 13px; text-decoration: underline; font-style: italic; }
  .quiz-options { display: flex; flex-direction: column; gap: 6px; }
  .quiz-opt {
    padding: 8px 12px; border-radius: 7px; border: 1px solid var(--border);
    background: var(--surface2); font-size: 12px; text-align: left; cursor: pointer;
  }
  .quiz-opt.correct { border-color: var(--correct); background: rgba(22,163,74,0.08); color: var(--correct); }
  .quiz-opt.wrong { border-color: var(--wrong); background: rgba(220,38,38,0.07); color: var(--wrong); text-decoration: line-through; }
  .quiz-explanation { font-size: 12px; color: #4b5563; background: #f9fafb; border-left: 3px solid var(--accent); padding: 9px 12px; margin-top: 8px; display: none; }
  .quiz-explanation.show { display: block; }

  /* === BOTTOM BAR === */
  .bottom-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(244,246,251,0.95); backdrop-filter: blur(12px);
    border-top: 1px solid var(--border); padding: 12px 24px;
    display: flex; align-items: center; gap: 14px; z-index: 100;
  }
  .check-btn { padding: 9px 22px; border-radius: 7px; border: none; background: var(--accent); color: #fff; font-weight: 700; cursor: pointer; }
</style>
</head>
<body>

<header>
  <div class="logo">Sentence<span>/</span>Scanner</div>
</header>

<div class="container">
  <div class="hero">
    <h1>My Role Model: <em>Jacques Cousteau</em></h1>
    <p>각 문장에서 <strong>동사(V)</strong>를 찾아 더블클릭으로 표시하세요.</p>
  </div>
  <div id="sentenceContainer"></div>
</div>

<div class="bottom-bar">
  <button class="check-btn" onclick="checkAnswers()">✓ 정답 확인</button>
  <div id="scoreDisplay" style="margin-left:auto; font-weight:700;"></div>
</div>

<script>
const DATA = {
  parts: [
    {
      id: "part1", label: "PART 1", title: "Introduction",
      sentences: [
        { id: "p1s1", text: "My role model is Jacques Cousteau, a French ocean explorer, inventor, and filmmaker.", verbs: ["is"] },
        { id: "p1s2", text: "He dedicated his life to exploring and documenting the wonders of the underwater world.", verbs: ["dedicated"] },
        { id: "p1s3", text: "As a young man, he dreamed of becoming a pilot, but then he broke both of his arms in a terrible car accident.", verbs: ["dreamed", "broke"] }
      ]
    },
    {
      id: "part2", label: "PART 2", title: "Achievement",
      sentences: [
        { id: "p2s4", text: "After a long series of failed attempts, he finally succeeded in developing a portable breathing device, which he called the \"Aqua-Lung.\"", verbs: ["succeeded"] }
      ]
    },
    {
      id: "part3", label: "PART 3", title: "Inspiration & Lessons",
      sentences: [
        { id: "p3s3", text: "Cousteau's curiosity drove him to constantly challenge himself in new areas, and his passion enabled him to make the impossible a reality.", verbs: ["drove", "enabled"] },
        { id: "p3s4", text: "Cousteau's life story inspired me to push the boundaries of what I can do.", verbs: ["inspired"] },
        { id: "p3s5", text: "Because of him, I am not afraid to try different things in life.", verbs: ["am"] },
        { id: "p3s6", text: "I will keep exploring until I find what suits me best.", verbs: ["will keep", "find", "suits"] }
      ]
    }
  ]
};

const QUIZ_DATA = {
  "p3s4": {
    underline: "what I can do",
    question: "밑줄 친 부분의 문법적 성격은?",
    options: ["관계대명사 what절 (명사절)", "의문사 what 간접의문문", "접속사 that절"],
    answer: 0,
    explanation: "선행사를 포함한 관계대명사 what이 이끄는 명사절로 전치사 of의 목적어입니다."
  },
  "p3s6": {
    underline: "until I find what suits me best",
    question: "위 부사절의 특징으로 옳은 것은?",
    options: ["시간의 부사절에서는 현재가 미래를 대신한다", "가정법 과거 문장이다", "명사절로서 주어 역할을 한다"],
    answer: 0,
    explanation: "until이 이끄는 시간의 부사절에서는 미래의 일이라도 현재 시제(find)를 사용합니다."
  }
};

let state = {};
DATA.parts.forEach(p => p.sentences.forEach(s => { state[s.id] = new Set(); }));

function tokenize(text) {
  const tokens = [];
  const re = /(\s+|[^\s]+)/g;
  let m;
  while ((m = re.exec(text)) !== null) {
    tokens.push({ raw: m[0], isSpace: /^\s+$/.test(m[0]) });
  }
  return tokens;
}

function render() {
  const container = document.getElementById('sentenceContainer');
  DATA.parts.forEach(part => {
    const sec = document.createElement('div');
    sec.className = 'part-section';
    sec.innerHTML = `<div class="part-header"><span class="part-badge">${part.label}</span><span class="part-title">${part.title}</span></div>`;

    part.sentences.forEach((sent, si) => {
      const card = document.createElement('div');
      card.className = 'sentence-card';
      
      const num = document.createElement('div');
      num.className = 'sentence-num';
      num.innerHTML = `<span>#${si+1}</span><span class="verb-count-badge">동사 ${sent.verbs.length}개</span>`;
      card.appendChild(num);

      const textEl = document.createElement('div');
      textEl.className = 'sentence-text';
      const tokens = tokenize(sent.text);
      let wordIdx = 0;
      tokens.forEach((tok) => {
        const span = document.createElement('span');
        span.textContent = tok.raw;
        if (!tok.isSpace) {
          span.className = 'word-token';
          const currentIdx = wordIdx;
          span.addEventListener('dblclick', () => {
            if (state[sent.id].has(currentIdx)) state[sent.id].delete(currentIdx);
            else state[sent.id].add(currentIdx);
            span.classList.toggle('is-verb');
          });
          wordIdx++;
        }
        textEl.appendChild(span);
      });
      card.appendChild(textEl);

      if (QUIZ_DATA[sent.id]) {
        const q = QUIZ_DATA[sent.id];
        const qb = document.createElement('div');
        qb.className = 'quiz-block';
        qb.innerHTML = `<div class="quiz-underline"><span class="quiz-underline-label">밑줄</span><span class="quiz-underline-text">${q.underline}</span></div>
                        <div style="font-size:13px; margin-bottom:10px;">${q.question}</div>`;
        const opts = document.createElement('div');
        opts.className = 'quiz-options';
        q.options.forEach((opt, oi) => {
          const btn = document.createElement('button');
          btn.className = 'quiz-opt';
          btn.innerHTML = opt;
          btn.onclick = () => {
            if (oi === q.answer) btn.classList.add('correct');
            else btn.classList.add('wrong');
            exp.classList.add('show');
          };
          opts.appendChild(btn);
        });
        const exp = document.createElement('div');
        exp.className = 'quiz-explanation';
        exp.textContent = "💡 " + q.explanation;
        qb.appendChild(opts);
        qb.appendChild(exp);
        card.appendChild(qb);
      }
      sec.appendChild(card);
    });
    container.appendChild(sec);
  });
}

function checkAnswers() {
  let correct = 0;
  let total = 0;
  DATA.parts.forEach(p => p.sentences.forEach(sent => {
    const tokens = tokenize(sent.text).filter(t => !t.isSpace).map(t => t.raw.replace(/[^a-zA-Z]/g,'').toLowerCase());
    sent.verbs.forEach(v => {
      total++;
      const vWords = v.toLowerCase().split(' ');
      const firstIdx = tokens.indexOf(vWords[0]);
      if (state[sent.id].has(firstIdx)) correct++;
    });
  }));
  document.getElementById('scoreDisplay').textContent = `정확도: ${Math.round(correct/total*100)}%`;
  alert(`검사 완료! 정확도: ${Math.round(correct/total*100)}%`);
}

render();
</script>
</body>
</html>
